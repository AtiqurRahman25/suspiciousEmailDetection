<!DOCTYPE html>
<html>
<head>
    <title>Smart Message Filter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 class="text-center">💬 AI Message Moderation System</h2>
    <p class="text-center text-muted">Offline ML + Database Logging System</p>

    <form method="POST">
        <textarea class="form-control mt-3" name="message" placeholder="Enter message..." required></textarea>
        <button class="btn btn-primary mt-3 w-100">Analyze</button>
    </form>

    {% if result %}
        <div class="mt-4">

            <div class="alert 
                {% if result != 'Safe' %}alert-danger{% else %}alert-success{% endif %}">
                <strong>{{ result }}</strong>
            </div>

            {% if result == "Safe" %}
                <div class="card p-3 bg-success text-white">
                    {{ text }}
                </div>
            {% else %}
                <div class="card p-3 bg-secondary text-white">
                    {{ masked }}
                </div>

                <button class="btn btn-warning mt-2" onclick="toggleMsg()">👁️ See Message</button>

                <div id="realMsg" class="card p-3 bg-dark text-white mt-2" style="display:none;">
                    {{ text }}
                </div>
            {% endif %}

        </div>
    {% endif %}
</div>

<script>
function toggleMsg() {
    var x = document.getElementById("realMsg");
    x.style.display = (x.style.display === "none") ? "block" : "none";
}
</script>

</body>
</html>
